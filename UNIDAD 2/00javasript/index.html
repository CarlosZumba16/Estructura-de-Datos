<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Adivina el Número</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            background-color: #34495e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { color: #f1c40f; }
        p { font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🎮 ¡Adivina el Número Secreto!</h1>
        <p>El juego ha comenzado en una ventana emergente.</p>
        <small>Presiona F12 para ver las respuestas detalladas en la Consola del Desarrollador.</small>
    </div>

    <script src="juego.js"></script>
</body>
</html>
